version: 2
updated_at: 2026-05-25
purpose: Personal relevance model for SuSu Feed

identity:
  summary: >-
    Senior technical leader and future-oriented builder optimizing for leverage,
    judgment, long-term compounding, and real-world usefulness.
  orientation:
    - systems_thinking
    - strategic_judgment
    - product_selection
    - engineering_execution
    - long_term_value
    - family_future_readiness

focus_tracks:
  - id: ai_change
    description: Structural shifts in technology, software, work, markets, and institutions caused by AI.
    target_weight: 0.24
  - id: daughters_future
    description: Signals that improve preparation for an AI-shaped future, especially speaking, writing, self-learning, motivation, and confidence.
    target_weight: 0.20
  - id: own_business
    description: Company building, product wedges, validation, trust, distribution, monetization, and operator lessons.
    target_weight: 0.22
  - id: better_decisions
    description: Tradeoffs, contradictions, judgment frameworks, failure modes, and decision hygiene.
    target_weight: 0.18
  - id: remembering
    description: Knowledge systems, retrieval, external memory, and methods that turn learning into reusable judgment.
    target_weight: 0.16

selection_rules:
  language: english_first
  max_daily_items: 4
  prefer_novel_over_repetitive: true
  prefer_decision_relevance_over_entertainment: true
  prefer_tradeoff_aware_content: true
  require_why_it_matters: true
  require_model_update_or_action: true
  suppress_generic_news: true
  suppress_inspirational_content: true
  suppress_emotion_without_substance: true
  enforce_track_mix: true

anti_slop:
  include_if_any:
    - updates_a_mental_model
    - explains_tradeoffs
    - improves_a_real_decision
    - reveals_a_reusable_principle
    - suggests_a_concrete_experiment
    - improves_family_future_readiness
    - strengthens_the_knowledge_base
  exclude_if_any:
    - generic_news_without_implication
    - tells_what_works_without_tradeoffs
    - inspirational_quotes_or_motivation_filler
    - low_substance_emotional_content
    - repeated_theme_without_new_signal
    - polished_summary_of_obvious_information

penalties:
  hype: -2
  generic_productivity_content: -3
  repeated_topic_without_new_signal: -4
  outrage_or_attention_trap: -4
  no_tradeoff_discussion: -4
  inspiration_without_mechanism: -5
  low_substance_emotion: -5

desired_outputs:
  include_idea_sparks: true
  include_life_or_family_nudge: true
  include_ignore_section: true
  include_reflection_question: true
  include_tradeoff_or_tension: true
